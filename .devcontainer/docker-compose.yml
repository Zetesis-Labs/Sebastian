services:
  dev:
    build: .
    volumes:
      - ..:/workspace:cached
      # Venv en VOLUMEN NOMBRADO, no en el mount: el python de un venv uv es un
      # symlink a un intérprete local al contenedor, así que un venv en el mount
      # compartido cuelga en otro contenedor/host y aparece incompleto (el
      # calvario de Pylance de esta sesión). El volumen sombrea esta ruta dentro
      # del contenedor y lo mantiene íntegro e independiente del host.
      - agent_venv:/workspace/agent/.venv
    working_dir: /workspace
    command: sleep infinity
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
    ports:
      - "8787:8787" # token server — el device lo busca en la IP del Mac en la LAN
    # Host LINUX: descomenta para pasar el USB directo al contenedor
    # (en macOS/Windows no aplica — el device pertenece a otro kernel).
    # devices:
    #   - /dev/ttyACM0:/dev/ttyACM0
    depends_on:
      - lgtm

  livekit:
    # SFU local (self-host de desarrollo, ROADMAP §2/§6): el device, el agente y
    # el token server dejan de depender de LiveKit Cloud. Config y racional del
    # UDP-mux/node-ip en livekit.yaml. Requiere .devcontainer/.env con:
    #   LIVEKIT_NODE_IP=<IP LAN del Mac>   (cambia al cambiar de red/sitio)
    #   LIVEKIT_API_SECRET=<32+ chars>     (openssl rand -hex 32; NO commitear)
    # El token server/agente usan LIVEKIT_URL=ws://$LIVEKIT_NODE_IP:7880 con
    # key "devkey" y ese mismo secreto (agent/.env).
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml --node-ip ${LIVEKIT_NODE_IP:?define LIVEKIT_NODE_IP en .devcontainer/.env (IP LAN del Mac)}
    environment:
      LIVEKIT_KEYS: "devkey: ${LIVEKIT_API_SECRET:?define LIVEKIT_API_SECRET en .devcontainer/.env}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880" # señalización ws + HTTP API
      - "7881:7881" # RTC fallback TCP
      - "7882:7882/udp" # RTC media — UDP mux de un solo puerto (ver livekit.yaml)

  lgtm:
    image: grafana/otel-lgtm:latest
    # Sin container_name fijo: bajo orquestación de devcontainer, un nombre fijo
    # choca entre proyectos compose (VS Code usa 'sebastian_devcontainer', un
    # 'docker compose' manual usa el nombre del directorio). Compose lo nombra
    # <proyecto>-lgtm-1. Los servicios internos lo resuelven como 'lgtm'; el
    # bridge del host usa localhost:4318 (puerto publicado). El MCP de Grafana
    # apunta a ese nombre generado — ver docs/DEVCONTAINER.md.
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP — el bridge serial del host exporta aquí

volumes:
  agent_venv: # venv del agente, local al contenedor (ver comentario en dev)
