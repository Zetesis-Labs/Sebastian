name: Deploy GitHub Pages

# Builds the factory firmware in CI (never a locally-produced binary) and
# publishes it with the web installer. sdkconfig is gitignored, so the build
# comes from sdkconfig.defaults — WiFi/token blank, so the merged image carries
# no credentials.

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - "web-installer/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-progress Pages run: cancelling mid-deploy leaves the Pages
# deployment pending and the next run fails with "Deployment failed, try again
# later". Let each deploy finish (GitHub's own Pages workflow does the same).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: herschel-runners
    steps:
      - uses: actions/checkout@v4

      # Build the React installer in CI (no committed build output). It writes to
      # ../docs/installer (vite outDir) and creates docs/installer/firmware/ via
      # public/, so the firmware merge below has a place to drop the real .bin.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-installer/pnpm-lock.yaml

      - name: Build the web installer (React → docs/installer)
        working-directory: web-installer
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build factory firmware + merge image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: firmware
          command: >-
            (idf.py reconfigure || true) &&
            find managed_components -name sdkconfig.rename -delete &&
            idf.py build &&
            python -m esptool --chip esp32s3 merge_bin
            -o ../docs/installer/firmware/sebastian-esp32s3-merged.bin
            --flash_mode dio --flash_freq 80m --flash_size 8MB
            0x0 build/bootloader/bootloader.bin
            0x8000 build/partition_table/partition-table.bin
            0x10000 build/sebastian.bin

      - name: Verify the image carries no credentials
        run: |
          bin=docs/installer/firmware/sebastian-esp32s3-merged.bin
          test -f "$bin" || { echo "merged bin missing"; exit 1; }
          echo "merged bin: $(du -h "$bin" | cut -f1)"
          for s in Pizarro LIVEKIT_API_SECRET; do
            if grep -aqF "$s" "$bin"; then echo "SECRET '$s' in bin"; exit 1; fi
          done
          echo "clean"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/installer

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: herschel-runners
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
