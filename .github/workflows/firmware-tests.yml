name: Firmware Tests

on:
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/firmware-tests.yml"
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - ".github/workflows/firmware-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zig-host-tests:
    runs-on: herschel-runners
    steps:
      - uses: actions/checkout@v4

      # core_test.zig only imports pure-logic modules (main/core/*, config,
      # xvf_pcm), so it compiles and runs on the host — no ESP-IDF, no idf.py.
      # We reuse the esp-idf docker only for its tooling (the herschel host has no
      # xz), download the same pinned Espressif Zig fork the firmware build uses
      # (kassane/zig-espressif-bootstrap 0.16.0-xtensa, x86_64-linux-musl static,
      # see firmware/cmake/zig.cmake), and run `zig test` directly. Python extracts
      # the .tar.xz so we don't depend on the xz binary.
      - name: Run Zig host tests
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: firmware
          command: >-
            curl -fsSL https://github.com/kassane/zig-espressif-bootstrap/releases/download/0.16.0-xtensa/zig-relsafe-x86_64-linux-musl-baseline.tar.xz -o /tmp/zig.tar.xz &&
            echo "9e3dcef9d6f6d552df641a12addc9e443a69b7cbdad85492ec677acd55b7de9b  /tmp/zig.tar.xz" | sha256sum -c - &&
            mkdir -p /tmp/zig &&
            tar -xJf /tmp/zig.tar.xz -C /tmp/zig &&
            ZIG="$(find /tmp/zig -maxdepth 2 -type f -name zig | head -1)" &&
            "$ZIG" test core_test.zig &&
            "$ZIG" fmt --check main core_test.zig build.zig

  esp-idf-build:
    # Validate the full ESP-IDF build/link on PRs too — pages.yml only builds on
    # push to main, so a PR could break the link/compile without CI noticing.
    runs-on: herschel-runners
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware (no deploy)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: firmware
          command: >-
            (idf.py reconfigure || true) &&
            find managed_components -name sdkconfig.rename -delete &&
            idf.py build
