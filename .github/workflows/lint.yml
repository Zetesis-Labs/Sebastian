name: Lint

on:
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ruff check
        run: pipx run ruff check agent
