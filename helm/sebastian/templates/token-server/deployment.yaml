{{- if .Values.tokenServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sebastian.fullname" . }}-token-server
  labels:
    {{- include "sebastian.labels" . | nindent 4 }}
    {{- include "sebastian.selectorLabels" (dict "ctx" . "component" "token-server") | nindent 4 }}
spec:
  replicas: {{ .Values.tokenServer.replicaCount }}
  # Recreate, not RollingUpdate: the pod binds a hostPort, so a surge pod can't
  # schedule alongside the old one (both want the same node port → stuck Pending).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "sebastian.selectorLabels" (dict "ctx" . "component" "token-server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sebastian.labels" . | nindent 8 }}
        {{- include "sebastian.selectorLabels" (dict "ctx" . "component" "token-server") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "sebastian.appSecurityContext" . | nindent 8 }}
      containers:
        - name: token-server
          image: "{{ .Values.tokenServer.image.repository }}:{{ .Values.tokenServer.image.tag }}"
          imagePullPolicy: {{ .Values.tokenServer.image.pullPolicy }}
          securityContext:
            {{- include "sebastian.containerSecurityContext" . | nindent 12 }}
          env:
            {{- include "sebastian.livekitEnv" .Values.tokenServer | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.tokenServer.service.targetPort }}
              protocol: TCP
              {{- if .Values.tokenServer.hostPort }}
              # The ESP32 is on the LAN, not on Tailscale, so it can't reach the
              # Traefik ingress. A hostPort on the node's LAN IP gives the device
              # a direct, DNS-free path: provision tokenServerUrl at
              # http://<node-ip>:{{ .Values.tokenServer.hostPort }}/token.
              hostPort: {{ .Values.tokenServer.hostPort }}
              {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.tokenServer.resources | nindent 12 }}
{{- end }}
