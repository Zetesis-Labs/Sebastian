{{- if and .Values.nats.enabled .Values.nats.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sebastian.fullname" . }}-nats
  labels:
    {{- include "sebastian.labels" . | nindent 4 }}
    {{- include "sebastian.selectorLabels" (dict "ctx" . "component" "nats") | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.nats.persistence.size }}
  {{- with .Values.nats.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
