{{- if .Values.ingress.enabled }}
{{- range $svc := list "server" "dashboard" "controlPlane" }}
{{- $cfg := index $.Values $svc }}
{{- if and $cfg.enabled $cfg.ingress.enabled $cfg.ingress.host }}
{{- $component := ternary "control-plane" $svc (eq $svc "controlPlane") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sebastian.fullname" $ }}-{{ $component }}
  labels:
    {{- include "sebastian.labels" $ | nindent 4 }}
    {{- include "sebastian.selectorLabels" (dict "ctx" $ "component" $component) | nindent 4 }}
  {{- with $.Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $.Values.ingress.className }}
  ingressClassName: {{ $.Values.ingress.className }}
  {{- end }}
  {{- if $.Values.ingress.tls }}
  tls:
    {{- toYaml $.Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ $cfg.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sebastian.fullname" $ }}-{{ $component }}
                port:
                  number: {{ $cfg.service.port }}
---
{{- end }}
{{- end }}
{{- end }}
