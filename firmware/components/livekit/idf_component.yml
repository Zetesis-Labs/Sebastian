dependencies:
  espressif/esp_capture:
    public: true
    version: ~0.7
  espressif/esp_peer: ~1.4.2
  espressif/esp_websocket_client: ~1.7.0
  idf: '>=5.4'
  livekit/khash: ~0.2.8
  livekit/nanopb: ~0.4.9
  tempotian/av_render:
    public: true
    version: ~0.9.1
  tempotian/media_lib_sal: ~0.9.1
description: LiveKit Client SDK for ESP32
discussion: https://community.livekit.io/c/robotics/
files:
  use_gitignore: true
issues: https://github.com/livekit/client-sdk-esp32/issues/
license: Apache-2.0
repository: git://github.com/livekit/client-sdk-esp32.git
# repository_info (commit_sha + path) is registry-publish metadata from the
# upstream component. It is NOT needed for a vendored override_path copy, and its
# `path: ./components/livekit` resolves (relative to this manifest) to a directory
# that does not exist — a clean idf-component-manager run rejects it at cmake
# config ("path field does not point to a directory"), which is what broke the
# esp-idf-build CI job. Upstream commit is recorded in firmware/main/idf_component.yml.
tags:
- Agents
- RPC
- Media
- WebRTC
targets:
- esp32s3
- esp32p4
url: https://livekit.io/
version: 0.3.10
